<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TodoList</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e8e8e0;
      --muted: #5a5a68;
      --accent: #c8f060;
      --btn-add: #3b82f6;
      --btn-add-hover: #2563eb;
      --accent-dim: #9ab840;
      --danger: #ff4f4f;
      --imp1: #3a3a44;
      --imp2: #4a5a2a;
      --imp3: #7a8a30;
      --imp4: #a8c040;
      --imp5: #c8f060;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 40px;
    }

    .header-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.4rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* Add form */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .task-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 48px;
      line-height: 1.5;
    }

    .task-input:focus {
      border-color: var(--accent);
    }

    .task-input::placeholder { color: var(--muted); }

    .char-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      margin-top: -8px;
    }

    .char-count.warn { color: var(--danger); }

    /* Importance selector */
    .importance-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .importance-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .stars {
      display: flex;
      gap: 6px;
    }

    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.15s;
      color: var(--muted);
    }

    .star-btn:hover { transform: scale(1.2); }
    .star-btn.active { color: var(--accent); }

    .add-btn {
      background: var(--btn-add);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 24px;
      height: 48px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover { background: var(--btn-add-hover); }
    .add-btn:active { transform: scale(0.97); }
    .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Stats bar */
    .stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 0 2px;
    }

    .stats-count { color: var(--accent); font-weight: 500; }

    /* Todo list */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.25s ease;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .todo-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
    }

    .todo-item[data-imp="1"]::before { background: var(--imp1); }
    .todo-item[data-imp="2"]::before { background: var(--imp2); }
    .todo-item[data-imp="3"]::before { background: var(--imp3); }
    .todo-item[data-imp="4"]::before { background: var(--imp4); }
    .todo-item[data-imp="5"]::before { background: var(--imp5); }

    .todo-item:hover { border-color: #3a3a44; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      color: var(--text);
    }

    /* Inline importance editor */
    .imp-display {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .imp-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.15s;
    }

    .imp-dot.filled { background: var(--accent); }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .delete-btn:hover { color: var(--danger); background: rgba(255,79,79,0.08); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

    .empty-state p {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      animation: pulse 1.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Importance inline edit popup */
    .imp-popup {
      position: absolute;
      right: 48px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .imp-popup-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      width: 26px;
      height: 26px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      transition: background 0.15s, color 0.15s;
    }

    .imp-popup-btn:hover, .imp-popup-btn.active {
      background: var(--accent);
      color: var(--bg);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      transition: transform 0.3s ease;
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Close button */
    .refresh-btn {
      position: fixed;
      top: 12px;
      right: 90px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: background 0.2s, transform 0.15s;
    }
    .refresh-btn:hover { background: rgba(0,0,0,0.25); transform: scale(1.1); }
    .refresh-btn:active { transform: scale(0.93); }

    .close-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: background 0.2s, transform 0.15s;
    }
    .close-btn:hover { background: rgba(0,0,0,0.25); transform: scale(1.1); }
    .close-btn:active { transform: scale(0.93); }

    /* Form toggle */
    .form-toggle-btn {
      width: 100%;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .form-toggle-btn:hover { border-color: var(--accent); color: var(--text); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 7px;
      background: none;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.03em;
    }
    .tab-btn.active { background: var(--accent); color: var(--bg); }

    /* Se régaler */
    .regaler-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      animation: slideIn 0.25s ease;
      position: relative;
    }
    .regaler-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      padding-right: 72px;
    }
    .pin-btn {
      position: absolute;
      top: 10px;
      right: 44px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      opacity: 0.25;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, background 0.2s;
    }
    .pin-btn:hover { opacity: 0.6; background: rgba(200,240,96,0.1); }
    .pin-btn.pinned { opacity: 1; }
    .regaler-item.pinned-item { border-color: var(--accent); }
    .regaler-photo {
      width: 100%;
      height: auto;
      border-radius: 6px;
      margin-bottom: 8px;
      display: block;
    }
    .regaler-text-display {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .regaler-edit-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .regaler-edit-btn:hover { color: var(--accent); }
    .regaler-inline-edit { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
    .regaler-inline-edit textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
      outline: none;
    }
    .regaler-inline-actions { display: flex; gap: 6px; }
    .regaler-save-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .regaler-cancel-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      cursor: pointer;
    }
    .regaler-item .delete-btn { position: absolute; top: 10px; right: 10px; }
    .photo-input-label {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      transition: border-color 0.2s;
    }
    .photo-input-label:hover { border-color: var(--accent); }
    #regalerPhoto { display: none; }
    .photo-preview {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      display: none;
      flex-shrink: 0;
    }

    /* Agenda */
    .agenda-legend {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }
    .agenda-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      animation: slideIn 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .agenda-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
    }
    .agenda-item[data-cat="enfants"]::before { background: #00aaff; }
    .agenda-item[data-cat="famille"]::before { background: #ff6600; }

    .agenda-item.done { opacity: 0.45; }
    .agenda-item.done .agenda-label { text-decoration: line-through; }
    .agenda-label { font-size: 14px; color: #888; font-weight: 600; }
    .agenda-datetime { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 3px; }
    .agenda-day {
      font-family: 'DM Mono', monospace;
      font-size: 24px;
      font-weight: 700;
      min-width: 36px;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }
    .agenda-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
    .imp-toggle {
      width: 100%;
      padding: 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .imp-toggle.active { background: var(--danger); color: #fff; border-color: var(--danger); }
    .agenda-important { color: var(--danger); font-weight: 800; font-size: 15px; margin-right: 4px; }
    .show-all-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: none;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .show-all-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-selector { display: flex; gap: 8px; }
    .cat-btn {
      flex: 1;
      padding: 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn.active-enfants { background: #00aaff; color: #fff; border-color: #00aaff; }
    .cat-btn.active-famille { background: #ff6600; color: #fff; border-color: #ff6600; }


    /* Config warning */
    .config-warn {
      background: rgba(255,79,79,0.08);
      border: 1px solid rgba(255,79,79,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #ff8080;
      line-height: 1.7;
    }

    .config-warn code {
      background: rgba(255,79,79,0.15);
      padding: 1px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<button class="refresh-btn" onclick="location.reload(true)" title="Rafraîchir">⟳</button>
<button class="close-btn" onclick="window.close()" title="Fermer">✕</button>
<div class="container">
  <header>
<h1>Ma <span>liste</span></h1>
    <div class="subtitle"><span style="color:#87CEEB">Organisé</span>. <span style="color:#FF2020">Priorisé</span>. <span style="color:#90EE90">Bien-être</span>.</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('todo', this)">Tâches</button>
    <button class="tab-btn" onclick="switchTab('regaler', this)">Se régaler</button>
    <button class="tab-btn" onclick="switchTab('agenda', this)">Agenda</button>
  </div>

  <div id="tab-todo" class="tab-content">
  <button class="form-toggle-btn" data-label="＋ Nouvelle tâche" onclick="toggleForm('form-todo', this)">＋ Nouvelle tâche</button>
  <div id="config-warn" class="config-warn" style="display:none">
    ⚠ Firebase non configuré — modifie la variable <code>firebaseConfig</code> dans <code>index.html</code> avec tes credentials.
  </div>

  <div class="add-form" id="form-todo" style="display:none">
    <div class="input-row">
      <textarea
        class="task-input"
        id="taskInput"
        placeholder="Nouvelle tâche…"
        maxlength="250"
        rows="1"
      ></textarea>
      <button class="add-btn" id="addBtn" onclick="addTask()">+ Ajouter</button>
    </div>
    <div class="char-count" id="charCount">0 / 250</div>
    <div class="importance-row">
      <span class="importance-label">Priorité</span>
      <div class="stars" id="addStars"></div>
    </div>
  </div>

  <div class="stats">
    <span id="statsText">— tâches</span>
    <span>triées par priorité</span>
  </div>

  <div id="listContainer">
    <div class="loading">chargement…</div>
  </div>
  </div>

  <div id="tab-regaler" class="tab-content" style="display:none">
    <button class="form-toggle-btn" data-label="＋ Nouveau plat" onclick="toggleForm('form-regaler', this)">＋ Nouveau plat</button>
    <div class="add-form" id="form-regaler" style="display:none">
      <input type="text" class="task-input" id="regalerLabel" placeholder="Nom du plat…" style="height:48px; resize:none">
      <label class="photo-input-label" for="regalerPhoto">
        <img id="regalerPhotoPreview" class="photo-preview">
        <span id="regalerPhotoLabel">📷 Choisir une photo…</span>
      </label>
      <input type="file" id="regalerPhoto" accept="image/*">
      <textarea class="task-input" id="regalerText" placeholder="Notes, recette, ingrédients…" style="height:80px; resize:vertical"></textarea>
      <button class="add-btn" onclick="addRegaler()" style="width:100%">+ Ajouter</button>
    </div>
    <div id="regalerList"><div class="loading">chargement…</div></div>
  </div>

  <div id="tab-agenda" class="tab-content" style="display:none">
    <button class="form-toggle-btn" data-label="＋ Nouvel événement" onclick="toggleForm('form-agenda', this)">＋ Nouvel événement</button>
    <div class="agenda-legend">
      <span><span class="legend-dot" style="background:#3b82f6"></span>Enfants</span>
      <span><span class="legend-dot" style="background:#ff6600"></span>Famille</span>
    </div>
    <div class="add-form" id="form-agenda" style="display:none">
      <input type="text" class="task-input" id="agendaLabel" placeholder="Libellé…" style="height:48px; resize:none">
      <div style="display:flex; gap:10px">
        <input type="date" class="task-input" id="agendaDate" style="height:48px; flex:1">
        <input type="time" class="task-input" id="agendaTime" style="height:48px; flex:1">
      </div>
      <div class="cat-selector">
        <button class="cat-btn active-enfants" id="catEnfants" onclick="selectCat('enfants')">Enfants</button>
        <button class="cat-btn" id="catFamille" onclick="selectCat('famille')">Famille</button>

      </div>
      <button class="imp-toggle" id="importantToggle" onclick="toggleImportant()">! Important</button>
      <button class="add-btn" onclick="addAgenda()" style="width:100%">+ Ajouter</button>
    </div>
    <div id="agendaList"><div class="loading">chargement…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, updateDoc,
    doc, onSnapshot, query, orderBy, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ─── 🔧 CONFIGURATION FIREBASE ───────────────────────────────────────────
  // Remplace ces valeurs par celles de ta console Firebase
  // (Project Settings > Your apps > Firebase SDK snippet > Config)
  const firebaseConfig = {
    apiKey:            "AIzaSyDwO51jqYWFExbQIVh9iJR9hBauykrKCBI",
    authDomain:        "todol-2e669.firebaseapp.com",
    projectId:         "todol-2e669",
    storageBucket:     "todol-2e669.firebasestorage.app",
    messagingSenderId: "345719979719",
    appId:             "1:345719979719:web:979e869ef1e7d9db8dc8e2"
  };
  // ─────────────────────────────────────────────────────────────────────────

  const isConfigured = !Object.values(firebaseConfig).some(v => v.startsWith("REPLACE_"));
  if (!isConfigured) {
    document.getElementById('config-warn').style.display = 'block';
  }

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "todos");

  // ── State ──────────────────────────────────────────────────────────────
  let selectedImp = 3;

  // ── Star selector (add form) ────────────────────────────────────────────
  function renderAddStars(val) {
    const container = document.getElementById('addStars');
    container.innerHTML = '';
    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.className = 'star-btn' + (i <= val ? ' active' : '');
      btn.textContent = '●';
      btn.title = `Priorité ${i}`;
      btn.onclick = () => { selectedImp = i; renderAddStars(i); };
      container.appendChild(btn);
    }
  }
  renderAddStars(selectedImp);

  // ── Char counter ────────────────────────────────────────────────────────
  const taskInput = document.getElementById('taskInput');
  const charCount = document.getElementById('charCount');
  taskInput.addEventListener('input', () => {
    const n = taskInput.value.length;
    charCount.textContent = `${n} / 250`;
    charCount.className = 'char-count' + (n > 220 ? ' warn' : '');
  });

  // ── Add task ────────────────────────────────────────────────────────────
  window.addTask = async function() {
    const text = taskInput.value.trim();
    if (!text) return;
    if (!isConfigured) { showToast('Configure Firebase d\'abord !'); return; }
    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    try {
      await addDoc(col, {
        text,
        importance: selectedImp,
        createdAt: serverTimestamp()
      });
      taskInput.value = '';
      charCount.textContent = '0 / 250';
      charCount.className = 'char-count';
      selectedImp = 3;
      renderAddStars(3);
      showToast('Tâche ajoutée ✓');
    } catch(e) {
      showToast('Erreur : ' + e.message);
    } finally {
      btn.disabled = false;
    }
  };

  // Enter key to submit
  taskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.addTask(); }
  });

  // ── Delete task ─────────────────────────────────────────────────────────
  window.deleteTask = async function(id) {
    if (!confirm('Supprimer cette tâche ?')) return;
    await deleteDoc(doc(db, 'todos', id));
    showToast('Tâche supprimée');
  };

  // ── Update importance ────────────────────────────────────────────────────
  window.updateImportance = async function(id, val) {
    await updateDoc(doc(db, 'todos', id), { importance: val });
  };

  // ── Realtime listener ────────────────────────────────────────────────────
  const q = query(col, orderBy('createdAt', 'desc'));
  onSnapshot(q, (snapshot) => {
    const items = [];
    snapshot.forEach(d => items.push({ id: d.id, ...d.data() }));
    items.sort((a, b) => (b.importance || 0) - (a.importance || 0));
    renderList(items);
  }, (err) => {
    document.getElementById('listContainer').innerHTML =
      `<div class="config-warn">Erreur Firestore : ${err.message}<br>Vérifie ta configuration et les règles de sécurité Firestore.</div>`;
  });

  // ── Render list ──────────────────────────────────────────────────────────
  function renderList(items) {
    const container = document.getElementById('listContainer');
    const statsText  = document.getElementById('statsText');

    statsText.innerHTML = `<span class="stats-count">${items.length}</span> tâche${items.length !== 1 ? 's' : ''}`;

    if (items.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">◎</div>
          <p>Aucune tâche pour l'instant.<br>Ajoute quelque chose à faire !</p>
        </div>`;
      return;
    }

    container.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'todo-list';

    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'todo-item';
      div.dataset.imp = item.importance || 1;
      div.dataset.id = item.id;

      // Dots indicator
      let dots = '';
      for (let i = 1; i <= 5; i++) {
        dots += `<div class="imp-dot${i <= item.importance ? ' filled' : ''}"></div>`;
      }

      div.innerHTML = `
        <span class="todo-text">${escHtml(item.text)}</span>
        <div class="imp-display" title="Cliquer pour modifier la priorité" onclick="toggleImpPopup('${item.id}', ${item.importance}, this)">
          ${dots}
        </div>
        <button class="delete-btn" onclick="deleteTask('${item.id}')" title="Supprimer">✕</button>
      `;
      list.appendChild(div);
    });

    container.appendChild(list);
  }

  // ── Importance popup ─────────────────────────────────────────────────────
  let activePopup = null;

  window.toggleImpPopup = function(id, current, el) {
    if (activePopup) { activePopup.remove(); activePopup = null; return; }

    const popup = document.createElement('div');
    popup.className = 'imp-popup';

    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.className = 'imp-popup-btn' + (i === current ? ' active' : '');
      btn.textContent = i;
      btn.onclick = (e) => {
        e.stopPropagation();
        updateImportance(id, i);
        popup.remove();
        activePopup = null;
      };
      popup.appendChild(btn);
    }

    const item = el.closest('.todo-item');
    item.style.position = 'relative';
    item.appendChild(popup);
    activePopup = popup;

    setTimeout(() => document.addEventListener('click', closePopup, { once: true }), 0);
  };

  function closePopup() {
    if (activePopup) { activePopup.remove(); activePopup = null; }
  }

  // ── Utils ────────────────────────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  };

  // ── Agenda ────────────────────────────────────────────────────────────────
  const agendaCol = collection(db, "agenda");
  let selectedCat = 'enfants';
  let selectedImportant = false;

  window.toggleImportant = function() {
    selectedImportant = !selectedImportant;
    document.getElementById('importantToggle').classList.toggle('active', selectedImportant);
  };

  window.selectCat = function(cat) {
    selectedCat = cat;
    document.getElementById('catEnfants').className = 'cat-btn' + (cat === 'enfants' ? ' active-enfants' : '');
    document.getElementById('catFamille').className = 'cat-btn' + (cat === 'famille' ? ' active-famille' : '');

  };

  // Contraindre le sélecteur de date à 2026
  const agendaDateInput = document.getElementById('agendaDate');
  agendaDateInput.min = '2026-01-01';
  agendaDateInput.max = '2026-12-31';
  agendaDateInput.value = new Date().toISOString().slice(0, 10).replace(/^\d{4}/, '2026');

  window.addAgenda = async function() {
    const label = document.getElementById('agendaLabel').value.trim();
    const date  = document.getElementById('agendaDate').value;
    const time  = document.getElementById('agendaTime').value;
    if (!label || !date) return;
    try {
      await addDoc(agendaCol, { label, date, time, category: selectedCat, important: selectedImportant, done: false, createdAt: serverTimestamp() });
      selectedImportant = false;
      document.getElementById('importantToggle').classList.remove('active');
      document.getElementById('agendaLabel').value = '';
      document.getElementById('agendaDate').value  = '';
      document.getElementById('agendaTime').value  = '';
      showToast('Événement ajouté ✓');
    } catch(e) { showToast('Erreur : ' + e.message); }
  };

  window.toggleAgendaDone = async function(id, done) {
    await updateDoc(doc(db, 'agenda', id), { done: !done });
  };

  window.deleteAgenda = async function(id) {
    if (!confirm('Supprimer cet événement ?')) return;
    await deleteDoc(doc(db, 'agenda', id));
    showToast('Événement supprimé');
  };

  let agendaItems = [];
  let showAllAgenda = false;

  window.toggleAllAgenda = function() {
    showAllAgenda = !showAllAgenda;
    renderAgendaList(agendaItems);
  };

  const aq = query(agendaCol, orderBy('date', 'asc'));
  onSnapshot(aq, (snapshot) => {
    agendaItems = [];
    snapshot.forEach(d => agendaItems.push({ id: d.id, ...d.data() }));
    agendaItems.sort((a, b) => {
      if (a.date !== b.date) return a.date > b.date ? 1 : -1;
      return (a.time || '') > (b.time || '') ? 1 : -1;
    });
    renderAgendaList(agendaItems);
  });

  function renderAgendaList(items) {
    const container = document.getElementById('agendaList');
    if (items.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📅</div>
          <p>Aucun événement.<br>Ajoute quelque chose à l'agenda !</p>
        </div>`;
      return;
    }

    const today = new Date(); today.setHours(0, 0, 0, 0);
    const maxDate = new Date(today); maxDate.setDate(today.getDate() + 6);
    const todayStr   = today.toISOString().slice(0, 10);
    const maxDateStr = maxDate.toISOString().slice(0, 10);

    const visible = items.filter(i => i.date >= todayStr && i.date <= maxDateStr);
    const others  = items.filter(i => i.date < todayStr || i.date > maxDateStr);
    const toRender = showAllAgenda ? items : visible;

    container.innerHTML = '';

    if (toRender.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><p>Aucun événement cette semaine.</p></div>`;
    }

    const catColors = { enfants: '#00aaff', famille: '#ff6600' };
    toRender.forEach(item => {
      const div = document.createElement('div');
      div.className = 'agenda-item' + (item.done ? ' done' : '');
      div.dataset.cat = item.category || 'enfants';
      const color   = catColors[item.category] || '#888';
      const dateObj  = item.date ? new Date(item.date + 'T00:00:00') : null;
      const dayNum   = dateObj ? dateObj.getDate() : '';
      const dayNames = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
      const dayAbbr  = dateObj ? dayNames[dateObj.getDay()] : '';
      const dateStr  = dateObj ? dayAbbr + ' ' + dateObj.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' }) : '';
      const isDistant = item.date < todayStr || item.date > maxDateStr;
      const monthStr  = isDistant && dateObj ? dateObj.toLocaleDateString('fr-FR', { month: 'short' }) : '';
      div.innerHTML = `
        <div class="agenda-day" style="color:${color}">${dayNum}${monthStr ? `<span style="display:block;font-size:9px;font-weight:400;opacity:0.7">(${monthStr})</span>` : ''}${item.time ? `<span style="display:block;font-size:9px;font-weight:400;opacity:0.8">${item.time}</span>` : ''}</div>
        <div style="flex:1; min-width:0">
          <div class="agenda-label">${item.important ? '<span class="agenda-important">!</span>' : ''}${escHtml(item.label)}</div>
        </div>
        <input type="checkbox" class="agenda-checkbox" ${item.done ? 'checked' : ''} onchange="toggleAgendaDone('${item.id}', ${item.done})">
        <button class="delete-btn" onclick="deleteAgenda('${item.id}')" title="Supprimer">✕</button>
      `;
      container.appendChild(div);
    });

    if (others.length > 0) {
      const btn = document.createElement('button');
      btn.className = 'show-all-btn';
      btn.onclick = toggleAllAgenda;
      btn.textContent = showAllAgenda
        ? '↑ Réduire'
        : `↓ Voir ${others.length} autre${others.length > 1 ? 's' : ''} événement${others.length > 1 ? 's' : ''}`;
      container.appendChild(btn);
    }
  }

  // ── Form toggle ───────────────────────────────────────────────────────────
  window.toggleForm = function(formId, btn) {
    const form = document.getElementById(formId);
    const isHidden = form.style.display === 'none';
    form.style.display = isHidden ? '' : 'none';
    btn.textContent = isHidden ? '↑ Masquer' : btn.dataset.label;
  };

  // ── Tab switching ─────────────────────────────────────────────────────────
  window.switchTab = function(tab, btn) {
    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).style.display = 'block';
    btn.classList.add('active');
  };

  // ── Se régaler ────────────────────────────────────────────────────────────
  const regalerCol = collection(db, "regaler");

  function resizeImage(file, maxSize = 800, quality = 0.75) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > h) { if (w > maxSize) { h = h * maxSize / w; w = maxSize; } }
          else        { if (h > maxSize) { w = w * maxSize / h; h = maxSize; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  document.getElementById('regalerPhoto').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const base64 = await resizeImage(file);
    const preview = document.getElementById('regalerPhotoPreview');
    preview.src = base64;
    preview.style.display = 'block';
    document.getElementById('regalerPhotoLabel').textContent = '✓ ' + file.name;
  });

  window.addRegaler = async function() {
    const label     = document.getElementById('regalerLabel').value.trim();
    const text      = document.getElementById('regalerText').value.trim();
    const fileInput = document.getElementById('regalerPhoto');
    if (!label) return;
    let photo = '';
    if (fileInput.files[0]) photo = await resizeImage(fileInput.files[0]);
    try {
      await addDoc(regalerCol, { label, photo, text, createdAt: serverTimestamp() });
      document.getElementById('regalerLabel').value = '';
      fileInput.value = '';
      document.getElementById('regalerPhotoPreview').style.display = 'none';
      document.getElementById('regalerPhotoLabel').textContent = '📷 Choisir une photo…';
      document.getElementById('regalerText').value = '';
      showToast('Plat ajouté ✓');
    } catch(e) {
      showToast('Erreur : ' + e.message);
    }
  };

  window.togglePin = async function(id, pinned) {
    await updateDoc(doc(db, 'regaler', id), { pinned: !pinned });
  };

  window.deleteRegaler = async function(id) {
    if (!confirm('Supprimer ce plat ?')) return;
    await deleteDoc(doc(db, 'regaler', id));
    showToast('Plat supprimé');
  };

  let regalerItems = [];

  const rq = query(regalerCol, orderBy('createdAt', 'desc'));
  onSnapshot(rq, (snapshot) => {
    regalerItems = [];
    snapshot.forEach(d => regalerItems.push({ id: d.id, ...d.data() }));
    regalerItems.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
    renderRegalerList(regalerItems);
  });

  function renderRegalerList(items) {
    const container = document.getElementById('regalerList');
    if (items.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🍽</div>
          <p>Aucun plat pour l'instant.<br>Ajoute quelque chose à déguster !</p>
        </div>`;
      return;
    }
    container.innerHTML = '';
    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'regaler-item';
      if (item.pinned) div.classList.add('pinned-item');
      div.innerHTML = `
        <div id="rlabel-${item.id}">
          <div class="regaler-label">${escHtml(item.label)}<button class="regaler-edit-btn" onclick="editRegalerLabel('${item.id}')" title="Modifier le titre" style="margin-left:6px">✏</button></div>
        </div>
        ${item.photo ? `<img class="regaler-photo" src="${escHtml(item.photo)}" alt="${escHtml(item.label)}" onerror="this.style.display='none'">` : ''}
        <div id="rtext-${item.id}">
          ${item.text ? `<span class="regaler-text-display">${escHtml(item.text)}</span>` : ''}
          <button class="regaler-edit-btn" onclick="editRegalerText('${item.id}')" title="Modifier">✏</button>
        </div>
        <button class="pin-btn ${item.pinned ? 'pinned' : ''}" onclick="togglePin('${item.id}', ${!!item.pinned})" title="${item.pinned ? 'Désépingler' : 'Épingler'}">📌</button>
        <button class="delete-btn" onclick="deleteRegaler('${item.id}')" title="Supprimer">✕</button>
      `;
      container.appendChild(div);
    });
  }

  window.editRegalerLabel = function(id) {
    const wrapper = document.getElementById('rlabel-' + id);
    const currentLabel = wrapper.querySelector('.regaler-label')?.childNodes[0]?.textContent?.trim() || '';
    wrapper.innerHTML = `
      <div class="regaler-inline-edit">
        <input type="text" id="redit-label-${id}" class="task-input" value="${escHtml(currentLabel)}" style="height:40px">
        <div class="regaler-inline-actions">
          <button class="regaler-save-btn" onclick="saveRegalerLabel('${id}')">✓ Enregistrer</button>
          <button class="regaler-cancel-btn" onclick="cancelRegalerLabel('${id}')">Annuler</button>
        </div>
      </div>
    `;
    const input = document.getElementById('redit-label-' + id);
    input.focus(); input.select();
  };

  window.saveRegalerLabel = async function(id) {
    const newLabel = document.getElementById('redit-label-' + id)?.value.trim() || '';
    if (!newLabel) return;
    await updateDoc(doc(db, 'regaler', id), { label: newLabel });
  };

  window.cancelRegalerLabel = function(id) {
    const item = regalerItems.find(i => i.id === id);
    if (!item) return;
    const wrapper = document.getElementById('rlabel-' + id);
    wrapper.innerHTML = `<div class="regaler-label">${escHtml(item.label)}<button class="regaler-edit-btn" onclick="editRegalerLabel('${id}')" title="Modifier le titre" style="margin-left:6px">✏</button></div>`;
  };

  window.editRegalerText = function(id) {
    const wrapper = document.getElementById('rtext-' + id);
    const currentText = wrapper.querySelector('.regaler-text-display')?.textContent?.trim() || '';
    wrapper.innerHTML = `
      <div class="regaler-inline-edit">
        <textarea id="redit-${id}" placeholder="Notes, recette, ingrédients…">${escHtml(currentText)}</textarea>
        <div class="regaler-inline-actions">
          <button class="regaler-save-btn" onclick="saveRegalerText('${id}')">✓ Enregistrer</button>
          <button class="regaler-cancel-btn" onclick="cancelRegalerEdit('${id}')">Annuler</button>
        </div>
      </div>
    `;
    document.getElementById('redit-' + id).focus();
  };

  window.saveRegalerText = async function(id) {
    const newText = document.getElementById('redit-' + id)?.value.trim() || '';
    await updateDoc(doc(db, 'regaler', id), { text: newText });
  };

  window.cancelRegalerEdit = function(id) {
    const item = regalerItems.find(i => i.id === id);
    if (!item) return;
    const wrapper = document.getElementById('rtext-' + id);
    wrapper.innerHTML = `
      ${item.text ? `<span class="regaler-text-display">${escHtml(item.text)}</span>` : ''}
      <button class="regaler-edit-btn" onclick="editRegalerText('${id}')" title="Modifier">✏</button>
    `;
  };
</script>
</body>
</html>
